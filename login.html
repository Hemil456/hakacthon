<!DOCTYPE html>
<html>
<head>
<title>DeliverX Login</title>

<style>

body{
margin:0;
font-family:Segoe UI;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
background:#020617;
color:white;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#16a34a;
}

.error{
color:#f87171;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>🚚 DeliverX Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error" class="error"></p>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

/* username rule */
let pattern=/^[a-z0-9_]+$/;

if(!pattern.test(user)){
document.getElementById("error").innerText=
"Username only small letters, digits and underscore allowed";
return;
}

if(pass==""){
document.getElementById("error").innerText=
"Enter password";
return;
}

/* login success */
window.location.href="dashboard.html";

}

</script>

</body>
</html>
